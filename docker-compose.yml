version: '3.8'

services:
  app:
    build: .
    container_name: gestao-seguros
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:gestao_seguros
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=mySecretKeyForJWTTokenGenerationInGestaoSegurosApplication2024WithHighEntropyAndLength
      - JWT_EXPIRATION=86400000
    networks:
      - gestao-seguros-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  gestao-seguros-network:
    driver: bridge

