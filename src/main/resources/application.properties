# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=Gestao de Seguros API

# Database Configuration (H2 - Development)
spring.datasource.url=jdbc:h2:mem:gestao_seguros
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationInGestaoSegurosApplication2024WithHighEntropyAndLength
jwt.expiration=86400000

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.gestao=DEBUG

